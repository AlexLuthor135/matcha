root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # The command to compile your code
  cmd = "go build -o ./tmp/main ."
  # The binary to run
  bin = "./tmp/main"
  # Watch these extensions
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Ignore these directories
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  # Stop the old process before starting the new one
  kill_delay = "0s"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true