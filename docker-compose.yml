services:

  db:
    image: postgres:17.6
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    ports:
      - 5432:5432
    networks:
      backend_network:
        ipv4_address: 172.20.0.2

  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - ./.env
    ports:
      - 5050:80
    networks:
      backend_network:
        ipv4_address: 172.20.0.5
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  web:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: air
    volumes:
      - ~/matcha_media:/backend/media
      - ~/matcha_static:/srv/matcha_static
      - ./backend:/backend
    ports:
      - "8000:8000"
    networks:
      frontend_network:
        ipv4_address: 172.19.0.3
      backend_network:
        ipv4_address: 172.20.0.6
    env_file:
      - ./.env
    depends_on:
      - db
      - redis


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - FORCE_COLOR=true
      - CHOKIDAR_USEPOLLING=true
      - VITE_HMR=true
      - HOST=0.0.0.0
    networks:
      frontend_network:
        ipv4_address: 172.19.0.4
    depends_on:
      - web

  redis:
      image: redis:alpine
      ports:
        - "6379:6379"
      networks:
        backend_network:
          ipv4_address: 172.20.0.4

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    ports:
      - 443:443
    depends_on:
      - web
      - frontend
    networks:
      frontend_network:
        ipv4_address: 172.19.0.2

networks:
  frontend_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/16

  backend_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  pgadmin_data:
  matcha_static:
    external: true